<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; }
  .mockup-container {
    position: relative;
    width: 1200px;
    height: 850px;
    overflow: hidden;
  }
  .desktop {
    position: absolute;
    top: 2%;
    left: 50%;
    transform: translateX(-50%);
    width: 68%;
    z-index: 10;
  }
  .desktop .screen-bezel {
    background: linear-gradient(to bottom, #374151, #1e293b);
    border-radius: 16px 16px 0 0;
    padding: 6px 6px 0 6px;
    box-shadow: 0 25px 60px -15px rgba(0,0,0,0.5);
  }
  .desktop .screen-inner {
    background: #0f172a;
    border-radius: 10px 10px 0 0;
    overflow: hidden;
  }
  .desktop .top-bar {
    display: flex;
    align-items: center;
    padding: 5px 12px;
    background: rgba(30,41,59,0.9);
  }
  .desktop .dots { display: flex; gap: 4px; }
  .desktop .dot { width: 7px; height: 7px; border-radius: 50%; }
  .desktop .dot.red { background: rgba(248,113,113,0.8); }
  .desktop .dot.yellow { background: rgba(250,204,21,0.8); }
  .desktop .dot.green { background: rgba(74,222,128,0.8); }
  .desktop .url-bar {
    margin: 0 auto;
    background: rgba(51,65,85,0.5);
    border-radius: 6px;
    padding: 2px 24px;
    height: 16px;
  }
  .desktop .screen-content {
    aspect-ratio: 16/10;
    overflow: hidden;
  }
  .desktop .screen-content img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: top;
  }
  .desktop .stand { position: relative; margin: 0 auto; }
  .desktop .stand-neck { background: linear-gradient(to bottom, #475569, #64748b); height: 5px; margin: 0 15%; border-radius: 0 0 2px 2px; }
  .desktop .stand-mid { background: linear-gradient(to bottom, #64748b, #94a3b8); height: 4px; margin: 0 25%; }
  .desktop .stand-base { background: linear-gradient(to bottom, rgba(148,163,184,0.5), rgba(100,116,139,0.5)); height: 6px; margin: 0 10%; border-radius: 0 0 8px 8px; }
  .desktop .apple-logo { text-align: center; padding: 6px 0; color: rgba(148,163,184,0.4); font-size: 20px; }
  .tablet {
    position: absolute;
    bottom: 4%;
    left: 1%;
    width: 32%;
    z-index: 20;
  }
  .tablet .tablet-bezel {
    background: linear-gradient(135deg, #374151, #1e293b);
    border-radius: 16px;
    padding: 4px;
    box-shadow: 0 25px 60px -15px rgba(0,0,0,0.4);
  }
  .tablet .tablet-inner { background: #0f172a; border-radius: 12px; overflow: hidden; }
  .tablet .camera { display: flex; justify-content: center; padding: 4px 0; }
  .tablet .camera-dot { width: 4px; height: 4px; border-radius: 50%; background: #475569; }
  .tablet .tablet-content { aspect-ratio: 3/4; overflow: hidden; }
  .tablet .tablet-content img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
  .tablet .home-bar { display: flex; justify-content: center; padding: 5px 0; }
  .tablet .home-indicator { width: 25%; height: 3px; border-radius: 999px; background: #475569; }
  .phone {
    position: absolute;
    bottom: 2%;
    right: 3%;
    width: 18%;
    z-index: 30;
  }
  .phone .phone-bezel {
    background: linear-gradient(135deg, #374151, #1e293b);
    border-radius: 24px;
    padding: 3px;
    box-shadow: 0 25px 60px -15px rgba(0,0,0,0.4);
  }
  .phone .phone-inner { background: #0f172a; border-radius: 20px; overflow: hidden; }
  .phone .notch { display: flex; justify-content: center; padding: 4px 0; }
  .phone .notch-bar { width: 30%; height: 4px; border-radius: 999px; background: #374151; }
  .phone .phone-content { aspect-ratio: 9/19; overflow: hidden; }
  .phone .phone-content img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
  .phone .phone-home { display: flex; justify-content: center; padding: 4px 0; }
  .phone .phone-home-bar { width: 35%; height: 3px; border-radius: 999px; background: #475569; }
</style>
</head>
<body>
<div class="mockup-container" id="mockup">
  <div class="desktop">
    <div class="screen-bezel"><div class="screen-inner">
      <div class="top-bar"><div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div><div class="url-bar"></div><div style="width:32px"></div></div>
      <div class="screen-content"><img id="desktop-img" src="" alt="Desktop"></div>
    </div></div>
    <div class="stand"><div class="stand-neck"></div><div class="stand-mid"></div><div class="stand-base"></div></div>
  </div>
  <div class="tablet"><div class="tablet-bezel"><div class="tablet-inner">
    <div class="camera"><div class="camera-dot"></div></div>
    <div class="tablet-content"><img id="tablet-img" src="" alt="Tablet"></div>
    <div class="home-bar"><div class="home-indicator"></div></div>
  </div></div></div>
  <div class="phone"><div class="phone-bezel"><div class="phone-inner">
    <div class="notch"><div class="notch-bar"></div></div>
    <div class="phone-content"><img id="phone-img" src="" alt="Phone"></div>
    <div class="phone-home"><div class="phone-home-bar"></div></div>
  </div></div></div>
</div>
</body>
</html>
