    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ezwebsite | Creative Digital Duo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Manrope', 'sans-serif'],
              display: ['Oswald', 'sans-serif'],
            },
            colors: {
              brand: {
                purple: '#7c3aed',
                blue: '#2563eb',
                dark: '#0f172a',
              }
            },
            animation: {
              'spin-slow': 'spin 12s linear infinite',
              'gradient': 'gradient 8s linear infinite',
              'marquee': 'marquee 25s linear infinite',
            },
            keyframes: {
              gradient: {
                '0%, 100%': {
                  'background-size': '200% 200%',
                  'background-position': 'left center'
                },
                '50%': {
                  'background-size': '200% 200%',
                  'background-position': 'right center'
                },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              }
            },
            backgroundSize: {
              '300%': '300%',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #0f172a;
      }
      .dark {
        --bg-color: #050505; /* Deep rich black */
        --text-color: #ffffff;
      }

      html {
        scroll-behavior: smooth;
        scroll-padding-top: 100px;
        overflow-x: hidden;
        width: 100%;
        height: 100%;
      }
      
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        transition: background-color 0.3s ease, color 0.3s ease;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        position: relative;
        font-family: 'Manrope', sans-serif;
      }

      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* Premium Paper Grain Texture */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.04;
        pointer-events: none;
        z-index: 9999;
      }
      .dark body::before {
        opacity: 0.08;
      }
      
      /* Mobile text stroke styles */
      .text-stroke {
        -webkit-text-stroke: 1px rgba(15, 23, 42, 0.2);
        color: transparent;
      }
      .dark .text-stroke {
        -webkit-text-stroke: 1px rgba(255, 255, 255, 0.15);
      }
      
      #root {
        width: 100%;
        position: relative;
      }

      /* Custom selection */
      ::selection {
        background: #2563eb;
        color: white;
      }
    </style>
